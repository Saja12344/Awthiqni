name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info('GitHub Pages already enabled');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info('Enabling GitHub Pages from gh-pages branch...');
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: 'legacy',
                source: { branch: 'gh-pages', path: '/' }
              });
              core.info('GitHub Pages enabled');
            }

  deploy:
    needs: enable-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
          force_orphan: true

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Print live URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const { data } = await github.rest.repos.getPages({ owner, repo });
              core.notice(`Live site: ${data.html_url}`);
            } catch (error) {
              core.warning('Enable Pages manually: Settings > Pages > gh-pages / (root)');
            }
